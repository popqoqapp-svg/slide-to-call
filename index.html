<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide to Call</title>
<style>
* { box-sizing: border-box; }
html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}
.slider-container {
    width: 310px; height: 55px;
    background-color: #C1C1C1;
    border-radius: 30px;
    position: relative;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}
.slider-text {
    font-size: 14px; color: white;
    transition: opacity 0.2s ease;
    pointer-events: none;
    user-select: none;
}
.slider-button {
    width: 45px; height: 45px;
    position: absolute;
    top: 50%; transform: translateY(-50%);
    left: 5px;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
}
.slider-button img {
    width: 45px; height: 45px;
    pointer-events: none;
    -webkit-user-drag: none;
}
</style>
</head>
<body>
<div class="slider-container" id="slider">
    <span class="slider-text" id="sliderText">Slide to Call</span>
    <a class="slider-button" id="sliderButton" href="#">
        <img src="https://static.wixstatic.com/media/cba853_e851f31ebd97495ab89427b68f0d5326~mv2.png">
    </a>
</div>
<script>
// ✅ Lee el número desde la URL: ?phone=+13125551234
const params = new URLSearchParams(window.location.search);
const phone = params.get('phone') || '';
const sliderButton = document.getElementById('sliderButton');

if (phone) {
    sliderButton.href = 'tel:' + phone;
} else {
    sliderButton.removeAttribute('href');
}

const sliderContainer = document.getElementById('slider');
const sliderText = document.getElementById('sliderText');
let isDragging = false;
let startX, buttonStartLeft;

sliderButton.addEventListener('touchstart', startDrag, { passive: true });
sliderButton.addEventListener('mousedown', startDrag);

function startDrag(e) {
    isDragging = true;
    startX = e.type === 'mousedown' ? e.pageX : e.touches[0].pageX;
    buttonStartLeft = parseInt(window.getComputedStyle(sliderButton).left, 10);
    document.addEventListener('touchmove', onDrag, { passive: true });
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('touchend', endDrag);
    document.addEventListener('mouseup', endDrag);
}

function onDrag(e) {
    if (!isDragging) return;
    sliderText.style.opacity = "0";
    const currentX = e.type === 'mousemove' ? e.pageX : e.touches[0].pageX;
    const dx = currentX - startX;
    let newLeft = buttonStartLeft + dx;
    const maxLeft = sliderContainer.clientWidth - sliderButton.clientWidth - 5;
    newLeft = Math.max(5, Math.min(newLeft, maxLeft));
    sliderButton.style.left = newLeft + 'px';
}

function endDrag(e) {
    if (!isDragging) return;
    isDragging = false;
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('touchend', endDrag);
    document.removeEventListener('mouseup', endDrag);

    const maxLeft = sliderContainer.clientWidth - sliderButton.clientWidth - 5;
    const reachedEnd = parseInt(sliderButton.style.left, 10) >= maxLeft - 2;

    if (reachedEnd) {
        setTimeout(() => {
            sliderButton.style.left = '5px';
            sliderText.style.opacity = "1";
        }, 500);
    } else {
        e.preventDefault && e.preventDefault();
        sliderButton.style.left = '5px';
        sliderText.style.opacity = "1";
    }
}
</script>
</body>
</html>
